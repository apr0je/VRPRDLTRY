    VrprdlInstance:
      type: object
      properties:
        instance_type:
          type: string
        planning_horizon:
          type: number
        vehicle_capacity:
          type: integer
        depot:
          $ref: "#/components/schemas/DepotInfo"
        customers:
          type: array
          items:
            $ref: "#/components/schemas/Customer"
        distance_matrix:
          type: object
          additionalProperties:
            type: object
            additionalProperties:
              type: number
        metadata:
          $ref: "#/components/schemas/InstanceMetadata"
      required:
        - instance_type
        - planning_horizon
        - vehicle_capacity
        - depot
        - customers
        - distance_matrix
        - metadata
